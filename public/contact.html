<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — IronWork</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: #0e0e10;
      color: #c8c8d0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid #242428;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.08em; color: #e8e8ec; text-decoration: none; }
    main {
      flex: 1;
      max-width: 600px;
      margin: 4rem auto;
      padding: 0 1.5rem;
      width: 100%;
    }
    h1 { font-size: 1.75rem; font-weight: 700; color: #e8e8ec; margin-bottom: 1.5rem; }
    p { line-height: 1.7; margin-bottom: 1rem; }
    a { color: #ff8c00; text-decoration: none; }
    a:hover { text-decoration: underline; }
    footer {
      padding: 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: #7a7a86;
      border-top: 1px solid #242428;
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">IRONWORK</a>
  </header>
  <main>
    <h1>Contact</h1>
    <p>Have a question, found a bug, or want to share feedback? We'd love to hear from you.</p>
    <p>Email us at <a href="mailto:hello@ironwork.app">hello@ironwork.app</a> and we'll get back to you within one business day.</p>
  </main>
  <footer>
    <a href="/">← Back to IronWork</a>
  </footer>
</body>
</html>
